name: equity_sectors
# ~100 liquid US large-caps, ~9-11 per GICS sector → deep cross-sectional breadth for
# sector-neutral factors (robust quantile sorts within each sector). gics_sector is
# hand-assigned (stable, GICS canonical labels). Survivorship-biased (current survivors) —
# fine for prototyping, not production claims. Some names list late (max-history pull
# handles ragged starts): META 2012, GM 2010, PSX 2012, CHTR 2009, TMUS 2007, etc.

<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1000" viewBox="0 0 1180 1000" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title  { font-size: 27px; font-weight: 700; fill: #0f172a; }
      .sub    { font-size: 14px; fill: #475569; }
      .layer  { font-size: 13px; font-weight: 700; fill: #1e293b; letter-spacing: .4px; }
      .step   { font-size: 15px; font-weight: 700; fill: #0f172a; }
      .mod    { font-size: 13px; font-weight: 600; fill: #0f172a; }
      .desc   { font-size: 11.5px; fill: #475569; }
      .chip   { font-size: 12px; font-weight: 600; fill: #0f172a; }
      .note   { font-size: 11px; fill: #64748b; }
      .feeds  { font-size: 11px; font-weight: 700; fill: #7c3aed; }
      .arrow  { font-size: 20px; fill: #16a34a; }
    </style>
  </defs>
  <rect x="0" y="0" width="1180" height="1000" fill="#f8fafc"/>

  <text x="40" y="48" class="title">Backtesting — granular daily accounting loop</text>
  <text x="40" y="72" class="sub">qhfi.backtest · position-and-cash space (not weights × returns) · real implementation ✓</text>

  <!-- ============ INPUTS ============ -->
  <g transform="translate(40,92)">
    <text x="0" y="14" class="layer">INPUTS</text>
    <g transform="translate(0,22)">
      <rect x="0"   y="0" width="356" height="60" rx="9" fill="#fef9c3" stroke="#fde047"/>
      <text x="14" y="24" class="mod">TargetWeights  (dates × instrument)</text>
      <text x="14" y="44" class="desc">from Strategy / FactorStrategy — the only thing a strategy emits</text>
      <rect x="372" y="0" width="356" height="60" rx="9" fill="#cffafe" stroke="#67e8f9"/>
      <text x="386" y="24" class="mod">Price panel  (close, + optional open)</text>
      <text x="386" y="44" class="desc">normalized daily bars from the data lake; NaN = non-trading day</text>
      <rect x="744" y="0" width="356" height="60" rx="9" fill="#e0e7ff" stroke="#a5b4fc"/>
      <text x="758" y="24" class="mod">Universe  (instrument metadata)</text>
      <text x="758" y="44" class="desc">lot_size · contract_multiplier · shortable · asset_class</text>
    </g>
  </g>
  <text x="395" y="190" class="arrow" text-anchor="middle">▼</text>

  <!-- ============ ENGINE (left) ============ -->
  <g transform="translate(40,200)">
    <rect x="0" y="0" width="740" height="476" rx="11" fill="#dcfce7" stroke="#86efac"/>
    <text x="16" y="26" class="layer">BacktestEngine.run — for each date t  (look-ahead guard: signal dated t − signal_lag governs day t)</text>

    <g transform="translate(20,42)">
      <!-- step 1 -->
      <rect x="0" y="0" width="700" height="62" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="14" y="26" class="step">① MARK</text>
      <text x="120" y="22" class="desc">value the book at the latest price</text>
      <text x="120" y="40" class="desc">per-instrument calendar: a NaN-price day is carried at last mark, never traded</text>
      <text x="350" y="78" class="arrow" text-anchor="middle">▼</text>
      <!-- step 2 -->
      <rect x="0" y="84" width="700" height="62" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="14" y="110" class="step">② FINANCE</text>
      <text x="140" y="106" class="desc">daily carry on the overnight book</text>
      <text x="140" y="124" class="desc">short-borrow + leverage financing − cash interest</text>
      <text x="610" y="118" class="feeds">◀ FinancingModel</text>
      <text x="350" y="162" class="arrow" text-anchor="middle">▼</text>
      <!-- step 3 -->
      <rect x="0" y="168" width="700" height="62" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="14" y="194" class="step">③ REBALANCE</text>
      <text x="160" y="190" class="desc">target weight → target UNITS (lot / contract rounding)</text>
      <text x="160" y="208" class="desc">trade only the delta from the drifted position · skip inside no-trade band</text>
      <text x="600" y="202" class="feeds">◀ ExecutionConfig</text>
      <text x="350" y="246" class="arrow" text-anchor="middle">▼</text>
      <!-- step 4 -->
      <rect x="0" y="252" width="700" height="62" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="14" y="278" class="step">④ FILL</text>
      <text x="120" y="274" class="desc">execute at close / next-open, at an ADVERSE slippage price</text>
      <text x="120" y="292" class="desc">commission charged per asset class</text>
      <text x="585" y="278" class="feeds">◀ SlippageModel</text>
      <text x="585" y="296" class="feeds">◀ CostModel</text>
      <text x="350" y="330" class="arrow" text-anchor="middle">▼</text>
      <!-- step 5 -->
      <rect x="0" y="336" width="700" height="62" rx="8" fill="#bbf7d0" stroke="#22c55e"/>
      <text x="14" y="362" class="step">⑤ RE-MARK</text>
      <text x="150" y="358" class="desc">value at close → realized equity and daily return</text>
      <text x="150" y="376" class="desc">path-dependent, from actual equity — never a dot-product</text>
    </g>
  </g>

  <!-- ============ PLUG-IN MODELS (right) ============ -->
  <g transform="translate(800,200)">
    <rect x="0" y="0" width="340" height="476" rx="11" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="16" y="26" class="layer">PLUG-IN MODELS / CONFIG</text>
    <g transform="translate(16,42)">
      <rect x="0" y="0" width="308" height="92" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
      <text x="12" y="22" class="mod">ExecutionConfig</text>
      <text x="12" y="42" class="desc">signal_lag · fill (close/next_open)</text>
      <text x="12" y="60" class="desc">rebalance_threshold (no-trade band)</text>
      <text x="12" y="78" class="desc">allow_fractional → lot/contract rounding</text>
      <text x="250" y="22" class="feeds">→ ③</text>

      <rect x="0" y="104" width="308" height="78" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
      <text x="12" y="126" class="mod">FinancingModel</text>
      <text x="12" y="146" class="desc">short_borrow · leverage · cash bps</text>
      <text x="12" y="164" class="desc">annualized, 360-day accrual</text>
      <text x="250" y="126" class="feeds">→ ②</text>

      <rect x="0" y="192" width="308" height="78" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
      <text x="12" y="214" class="mod">SlippageModel</text>
      <text x="12" y="234" class="desc">adverse bps of reference price</text>
      <text x="12" y="252" class="desc">moves the fill price, not just a cost line</text>
      <text x="250" y="214" class="feeds">→ ④</text>

      <rect x="0" y="280" width="308" height="92" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
      <text x="12" y="302" class="mod">CompositeCostModel</text>
      <text x="12" y="322" class="desc">commission dispatched per asset class:</text>
      <text x="12" y="340" class="desc">crypto bps · equity per-share+min · futures/contract</text>
      <text x="12" y="360" class="desc">(bps real · equity/futures stub)</text>
      <text x="250" y="302" class="feeds">→ ④</text>
    </g>
  </g>

  <text x="395" y="700" class="arrow" text-anchor="middle">▼</text>

  <!-- ============ OUTPUT ============ -->
  <g transform="translate(40,708)">
    <rect x="0" y="0" width="1100" height="104" rx="11" fill="#dcfce7" stroke="#22c55e"/>
    <text x="16" y="24" class="layer">BacktestResult — full execution audit (all series populated)</text>
    <g transform="translate(16,34)">
      <g>
        <rect x="0"   y="0" width="168" height="24" rx="6" fill="#ffffff" stroke="#86efac"/><text x="84"  y="16" class="chip" text-anchor="middle">equity_curve</text>
        <rect x="180" y="0" width="120" height="24" rx="6" fill="#ffffff" stroke="#86efac"/><text x="240" y="16" class="chip" text-anchor="middle">returns</text>
        <rect x="312" y="0" width="168" height="24" rx="6" fill="#ffffff" stroke="#86efac"/><text x="396" y="16" class="chip" text-anchor="middle">weights (EOD)</text>
        <rect x="492" y="0" width="120" height="24" rx="6" fill="#ffffff" stroke="#86efac"/><text x="552" y="16" class="chip" text-anchor="middle">turnover</text>
        <rect x="624" y="0" width="100" height="24" rx="6" fill="#ffffff" stroke="#86efac"/><text x="674" y="16" class="chip" text-anchor="middle">cash</text>
        <rect x="736" y="0" width="160" height="24" rx="6" fill="#ffffff" stroke="#86efac"/><text x="816" y="16" class="chip" text-anchor="middle">gross / net exp.</text>
        <rect x="908" y="0" width="160" height="24" rx="6" fill="#ffffff" stroke="#86efac"/><text x="988" y="16" class="chip" text-anchor="middle">positions (units)</text>
      </g>
      <g transform="translate(0,32)">
        <rect x="0"   y="0" width="140" height="24" rx="6" fill="#f0fdf4" stroke="#86efac"/><text x="70"  y="16" class="chip" text-anchor="middle">commission</text>
        <rect x="152" y="0" width="120" height="24" rx="6" fill="#f0fdf4" stroke="#86efac"/><text x="212" y="16" class="chip" text-anchor="middle">slippage</text>
        <rect x="284" y="0" width="120" height="24" rx="6" fill="#f0fdf4" stroke="#86efac"/><text x="344" y="16" class="chip" text-anchor="middle">financing</text>
        <rect x="416" y="0" width="180" height="24" rx="6" fill="#f0fdf4" stroke="#86efac"/><text x="506" y="16" class="chip" text-anchor="middle">trades (fill log)</text>
        <text x="612" y="16" class="note">→ commission + slippage + financing = total daily cost drag</text>
      </g>
    </g>
  </g>

  <!-- ============ DOWNSTREAM ============ -->
  <g transform="translate(40,828)">
    <text x="0" y="14" class="layer">CONSUMED BY</text>
    <g transform="translate(0,22)">
      <rect x="0" y="0" width="540" height="56" rx="9" fill="#bbf7d0" stroke="#22c55e"/>
      <text x="14" y="24" class="mod">evaluation → metrics + Scorecard.grade</text>
      <text x="14" y="44" class="desc">Sharpe / Calmar / drawdown / turnover → promotion gate (recorded)</text>
      <rect x="560" y="0" width="540" height="56" rx="9" fill="#dcfce7" stroke="#86efac" stroke-dasharray="4 3"/>
      <text x="574" y="24" class="mod">backtest/validation → walk-forward (stub)</text>
      <text x="574" y="44" class="desc">rolling purged OOS slices → feeds scorecard min_oos_sharpe_ratio</text>
    </g>
  </g>

  <!-- ============ FOOTER ============ -->
  <g transform="translate(40,912)">
    <rect x="0" y="0" width="1100" height="72" rx="10" fill="#0f172a"/>
    <text x="16" y="26" class="layer" fill="#e2e8f0">GUARANTEES &amp; SIMPLIFICATIONS</text>
    <text x="16" y="46" class="desc" fill="#cbd5e1">✓ look-ahead guard (signal t−lag) · ✓ path-dependent equity · ✓ units match the paper loop (no backtest↔paper drift)</text>
    <text x="16" y="62" class="desc" fill="#94a3b8">simplifications still in place: no intraday path (close/open fills) · flat-bps market impact · uniform borrow per book · corporate actions and futures rolls resolved upstream in data providers</text>
  </g>
</svg>
